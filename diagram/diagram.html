<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RC_Design 시스템 구조도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  h1 { color: #e0e0e0; text-align: center; padding: 10px; font-size: 1.3em; flex-shrink: 0; }
  #controls {
    display: flex; justify-content: center; gap: 8px; padding: 0 0 8px 0; flex-shrink: 0; flex-wrap: wrap;
  }
  #controls button {
    background: #2a9d8f; color: #fff; border: none; border-radius: 6px;
    padding: 5px 14px; cursor: pointer; font-size: 0.85em;
  }
  #controls button:hover { background: #40916c; }
  #controls span { color: #aaa; font-size: 0.8em; line-height: 28px; }
  #cy-wrapper { flex: 1; margin: 0 8px 8px; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
  #cy { width: 100%; height: 100%; }
  /* 우클릭 메뉴 방지 */
  #cy { -webkit-user-select: none; user-select: none; }
  #desc-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: hidden;
  }
  .desc-label {
    position: absolute; white-space: pre; font-size: 9px; color: #aaa;
    font-family: 'Segoe UI', sans-serif; text-align: center;
    transform: translate(-50%, 0); line-height: 1.3;
  }
  #edit-box {
    position: absolute; display: none; z-index: 100;
    background: #1a1a2e; border: 2px solid #2a9d8f; border-radius: 6px;
    padding: 4px; transform: translate(-50%, -50%);
  }
  #edit-box textarea {
    background: #0d1117; color: #e0e0e0; border: none; outline: none;
    font-family: 'Segoe UI', sans-serif; font-size: 12px;
    resize: both; min-width: 160px; min-height: 40px; padding: 4px;
  }
  #edit-box .edit-hint {
    font-size: 9px; color: #666; text-align: center; margin-top: 2px;
  }
  #pending-badge {
    background: #e74c3c; color: #fff; border-radius: 10px;
    padding: 2px 10px; font-size: 0.8em; display: none; cursor: pointer;
  }
</style>
</head>
<body>
<h1>RC_Design v0.5.1 — 시스템 구조도</h1>
<div id="controls">
  <button onclick="fitAll()">전체 보기</button>
  <button onclick="collapseAll()">모두 접기</button>
  <button onclick="expandAll()">모두 펼치기</button>
  <button onclick="resetPositions()" style="background:#e74c3c">위치 초기화</button>
  <span id="pending-badge" onclick="alert(JSON.stringify(window.pendingChanges,null,2))">변경: 0건</span>
  <span>우클릭: 접기/펼치기 | 휠클릭: 편집 | 휠: 줌 | 드래그: 이동</span>
</div>
<div id="cy-wrapper"><div id="cy"></div><div id="desc-overlay"></div><div id="edit-box"><textarea id="edit-text"></textarea><div class="edit-hint">Enter: 저장 | Esc: 취소</div></div></div>
<script>
// ═══════════════════════════════════════════════
// 위치 지정 헬퍼
// ═══════════════════════════════════════════════
function n(id, label, parent, cat, x, y, desc) {
  var d = { id: id, label: label, cat: cat };
  if (parent) d.parent = parent;
  if (desc) d.desc = desc;
  return { data: d, position: { x: x, y: y } };
}
// 노드 설명 데이터 (초기화 후 일괄 적용)
var NODE_DESCS = {"ST_PORT":"사용가능한 포트 탐색 (8501~)","ST_MAIN":"Streamlit 서버 시작 + 브라우저 오픈","ST_OPEN":"HTML 랜딩페이지 자동 열기","APP_MAIN":"Streamlit 앱 초기화, 페이지 설정","APP_PATCH":"패치노트.md → 사이드바 표시","APP_WEEK":"해당 주의 목요일 날짜 계산","PI_MAIN":"PDF 업로드 UI + 파서 호출 분기","PP_PARSE":"PDF 전체 파싱 메인 함수","PP_CLASSIFY":"페이지별 소프트웨어 종류 판별\n(MIDAS/BeST.RC/BeST.Steel)","PP_MBEAM":"MIDAS Gen 보 결과 텍스트 파싱","PP_MCOL":"MIDAS Gen 기둥 결과 텍스트 파싱","PP_BBEAM":"BeST.RC 보 결과 텍스트 파싱","PP_BCOL":"BeST.Steel 기둥 결과 텍스트 파싱","PP_MERGE":"동일 부재 중복 결과 병합\n+ MIDAS/BeST 우선순위 정리","PP_UTIL":"정규식 숫자 추출 헬퍼\n(1~5줄 단순 변환 함수)","AP_EXTRACT":"PDF에서 키워드 포함 페이지만 필터링","AP_PARSE":"Claude Haiku API에 텍스트 전송\n→ JSON 스키마로 부재 정보 추출","AP_JSON":"AI 응답 텍스트 → JSON 안전 파싱\n(마크다운 코드블록 제거 포함)","PV_RENDER":"AI 분석 탭 메인 UI 렌더링","PV_BTABLE":"보 파싱 결과 테이블 표시","PV_CTABLE":"기둥 파싱 결과 테이블 표시","PV_OTABLE":"기타 부재 파싱 결과 표시","PV_MEMBERS":"부재 선택 드롭다운 렌더링","PV_KEY":"st.secrets에서 API키/비밀번호 읽기","PV_SV":"session_state 안전 접근 헬퍼","PV_APPLY":"선택 부재 값 → session_state 저장\n(pdf_L_x, pdf_fck 등)","IN_RENDER":"입력 섹션 전체 UI 렌더링\n(경간/하중/재료/기둥/내진)","IN_PICK":"오버라이드 값 우선 반환\nsession_state에 저장된 수정값 확인","IN_GEO":"L_x: X보 경간(mm)\nL_y: Y보 경간(mm)\nh_column: 기둥높이(mm)","IN_LOAD":"DL_area: 마감하중(kN/m²)\nLL_area: 활하중(kN/m²)\nshow_ground_beam: 바닥보 여부\nDL_area_ground: 바닥보 DL\nLL_area_ground: 바닥보 LL","IN_COL":"column_loads[]: 기둥별 리스트\n├ 기둥명, Pu_add(kN)\n├ Mux_add, Muy_add(kN·m)\n└ E_Pu, E_Mux, E_Muy (지진)","IN_MAT":"fc_k: 콘크리트 강도(MPa)\nfy: 철근 항복(MPa)\nn_zones: 스터럽 구간수(2/3/4)\nseismic_enabled: 내진 여부\nframe_type: OMF/IMF","IN_OV":"h_beam_x, b_beam_x: X보 고정\nh_beam_y, b_beam_y: Y보 고정\nc_column_size: 기둥 고정\nt_slab_size: 슬래브 고정\n(None이면 자동설계)","BM_INIT":"BeamAnalyzer 생성\nL mm→m, h=L/28(50mm올림)\nb=h×0.5(50mm올림)\nw_slab = DL×S + 자중\nw_u = 1.2×w_DL + 1.6×w_LL","BM_FORCES":"양단고정보 부재력\nM_neg = w_u×L²/12 (지점)\nM_pos = w_u×L²/24 (중앙)\nV_max = w_u×L/2","BM_FLEX":"KDS 41 20 22 §4.2 휨설계\nd = h - cover - d_s/2 - d_b/2\nRn = Mu×10⁶/(φ×b×d²)\ndisc = 1 - 2Rn/(0.85fck)\nρ = (0.85fck/fy)(1-√disc)\nAs_req = ρ×b×d\nφ-εt 수렴 10회 반복","BM_REBAR":"철근 배치 결정\nD13~D32 순회 탐색\nn = ⌈As_req/Ab⌉\n1단: S_min ≥ max(25,db,33.3)\n2단 시 d_c_2layer 재산정\n상하부근 직경 통일 적용","BM_DEFL":"KDS 41 20 30 §4.3 처짐\nMcr = fr×Ig/yt\nIcr = n×As×(d-kd)² + b×kd³/3\nIe = Icr+(Ig-Icr)(Mcr/Ma)³\nδ_i = 5wL⁴/(384EcIe)\nδ_long = λΔ×δ_i(DL)\nλΔ = ξ/(1+50ρ')\n허용: L/480(DL+LL), L/240(전체)","BM_SHEAR":"KDS 41 20 22 §4.3 전단\nV_at_d = V_max - w_u×d/1000\nVc = (1/6)√fck×b×d\nVs = Vu/φ - Vc\ns = Av×fyt×d/Vs\ns_max = min(d/2, 600)","BM_ZONES":"구간별 스터럽 간격\nn_zones(2/3/4)등분\n각 구간 최대 Vu에서\n필요 s 산정\n지점부 s↓ 중앙부 s↑","BM_CRACK":"KDS 14 20 50 균열제어\nfs = 2/3×fy\ns_max = 380(280/fs) - 2.5cc\n또는 300(280/fs)\n실제 간격 ≤ s_max 확인","BM_DEV":"KDS 14 20 52 정착길이\nld = (fy×ψt×ψe×ψs)/(1.1λ√fck)×db\ncb = min(cover+db/2, 간격/2)\nKtr = 40Atr/(s×n)\nld_min = max(300, 계산값)\n이음길이 = 1.3×ld (B급)","CM_MFA":"지배조합 선택\n모든 조합별 예비설계 실행\nseverity = c×1000 + ρ×10⁶\n최대 severity 조합이 지배","CM_INIT":"ColumnAnalyzer 생성\nc = max(bx,by)+50 (50mm올림)\nMu = √(Mux²+Muy²) SRSS","CM_SLEND":"KDS 41 20 40 세장비\nlu = h_col - h_beam\nλ = k×lu/r (k=1.0)\nr = 0.3×c\nλ>22이면 세장기둥\nEI = (0.2EcIg+EsIse)/(1+βd)\nPc = π²EI/(klu)²\nδns = Cm/(1-Pu/(0.75Pc)) ≥ 1.0","CM_AM":"확대 모멘트 적용\nMcx = δns_x × M2x\nMcy = δns_y × M2y\nMu = √(Mcx²+Mcy²)","CM_REBAR":"KDS 41 20 20 P-M 설계\n점A: 순압축 φPn_max\n점B: 균형파괴 (εs=εy)\n점C: 순휨 (Pn=0)\nB→C 50분할 포락선\nBresler 쌍축: 1/φPn\n= 1/φPnx+1/φPny-1/φPno","CM_BRES":"Bresler 상반식 수렴\n단축 Pn: 이분법 60회\nc 가정 → 단면력 산정\n→ 편심 일치까지 반복\nφ = 0.65(압축) ~ 0.85(인장)\n전이구간 선형보간","CM_TIE":"KDS 41 20 44 띠철근\ns ≤ min(16db, 48dt, c)\ndt = D10(9.53) or D13(12.7)\ndb > 32mm이면 D13 사용\nIMF 시 lo구간 s↓","CM_JOINT":"KDS 41 17 접합부 전단\nT = As_beam_top × fy\nVcol = M_neg/(h_col/2)\nVj = T - Vcol\nφVn = 0.85×γ√fck×Aj\nγ = 1.0(IMF)/1.2(기타)","CM_IMF":"KDS 41 17 §4.5 IMF기둥\nlo = max(c, h_col/6, 450)\nlo구간 s = min(c/2, 8db, 24dt, 300)\nSCWB: ΣMnc ≥ 1.2×ΣMnb","CS1":"슬래브 두께 산정\n1방향/2방향 판별\n하중분배폭 S_slab 계산","CB1":"초기 단면 가정\nh=L/28 → 50mm올림\nb=h×0.5 → 50mm올림\n(오버라이드 시 고정값)","CB3":"강도 판정\nAs_req=0 → disc<0\n→ 단면 강도 부족\nY   var isFunc = firstLine.indexOf('()') !== -1;

      var funcLines = [];
      lines.forEach(function(line) {
        if (line.indexOf('()') !== -1) funcLines.push(line);
      });
      if (funcLines.length > 0) n.data('label', funcLines.join('\n'));
    }

  var desc = n.data('desc');
  if (desc) {
    var span = document.createElement('span');
    span.className = 'desc-label';
    span.dataset.nodeId = n.id();
    span.textContent = desc;
    descOverlay.appendChild(span);
    descElements[n.id()] = span;
  }
});

// DOM 오버레이 위치 업데이트
function updateDescPositions() {
  var zoom = cy.zoom();
  var pan = cy.pan();
  Object.keys(descElements).forEach(function(nid) {
    var node = cy.getElementById(nid);
    var span = descElements[nid];
    if (!node || node.removed() || !node.visible() || node.hasClass('hidden')) {
      span.style.display = 'none';
      return;
    }
    var bb = node.renderedBoundingBox();
    var x = (bb.x1 + bb.x2) / 2;
    var y = bb.y2 + 2; // 노드 바로 아래
    span.style.left = x + 'px';
    span.style.top = y + 'px';
    span.style.fontSize = Math.max(6, Math.min(12, 9 * zoom)) + 'px';
    span.style.display = (zoom < 0.15) ? 'none' : '';
  });
}

window.pendingChanges = {};
var editBox = document.getElementById('edit-box');
var editText = document.getElementById('edit-text');
var editingNode = null;
var pendingBadge = document.getElementById('pending-badge');

function updateBadge() {
  var cnt = Object.keys(window.pendingChanges).length;
  pendingBadge.style.display = cnt > 0 ? 'inline' : 'none';
  pendingBadge.textContent = '변경: ' + cnt + '건';
}

// 휠클릭 (middle button) → 편집 모드 (DOM 레벨에서 캡처)
document.getElementById('cy').addEventListener('mousedown', function(e) {
  if (e.button !== 1) return; // 휠클릭만
  e.preventDefault();
  e.stopPropagation();
  // 클릭 위치에서 가장 가까운 노드 찾기
  var rect = document.getElementById('cy').getBoundingClientRect();
  var pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
  var rendered = cy.nodes(':childless').filter(function(n) {
    if (!n.visible()) return false;
    var bb = n.renderedBoundingBox();
    return pos.x >= bb.x1 && pos.x <= bb.x2 && pos.y >= bb.y1 && pos.y <= bb.y2;
  });
  if (rendered.length === 0) return;
  var node = rendered[0];
  editingNode = node;

  // 현재 라벨 + 설명 합쳐서 편집창에 표시
  var label = node.data('label') || '';
  var descEl = descElements[node.id()];
  var desc = descEl ? descEl.textContent : '';
  var fullText = desc ? label + '\n' + desc : label;

  editText.value = fullText;
  var bb = node.renderedBoundingBox();
  var wrapperRect = document.getElementById('cy-wrapper').getBoundingClientRect();
  editBox.style.left = ((bb.x1 + bb.x2) / 2) + 'px';
  editBox.style.top = ((bb.y1 + bb.y2) / 2) + 'px';
  editBox.style.display = 'block';
  editText.style.width = Math.max(200, bb.w * 1.5) + 'px';
  editText.style.height = Math.max(60, bb.h * 1.5) + 'px';
  editText.focus();
  editText.select();
}, true); // capture phase

// 휠클릭 기본 동작(자동스크롤) 방지
document.getElementById('cy').addEventListener('auxclick', function(e) {
  if (e.button === 1) e.preventDefault();
});

// Enter → 저장, Esc → 취소
editText.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    editBox.style.display = 'none';
    editingNode = null;
  } else if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    saveEdit();
  }
});

function saveEdit() {
  if (!editingNode) return;
  var newText = editText.value;
  var nodeId = editingNode.id();
  var oldLabel = editingNode.data('label');
  var oldDesc = descElements[nodeId] ? descElements[nodeId].textContent : '';
  var oldFull = oldDesc ? oldLabel + '\n' + oldDesc : oldLabel;

  if (newText !== oldFull) {
    var lines = newText.split('\n');
    var isFunc = editingNode.hasClass('is-func');
    var isFile = editingNode.hasClass('is-file');

    if (isFunc) {
      // 함수줄과 설명줄 분리
      var funcLines = [];
      var descLines = [];
      lines.forEach(function(l) {
        if (l.indexOf('()') !== -1) funcLines.push(l);
        else if (l.trim()) descLines.push(l);
      });
      editingNode.data('label', funcLines.join('\n'));
      if (descElements[nodeId]) {
        descElements[nodeId].textContent = descLines.join('\n');
      }
    } else if (isFile) {
      editingNode.data('label', lines[0]);
      if (descElements[nodeId] && lines.length > 1) {
        descElements[nodeId].textContent = lines.slice(1).join('\n');
      }
    } else {
      editingNode.data('label', newText);
    }

    // 변경사항 기록
    window.pendingChanges[nodeId] = {
      old: oldFull,
      new: newText,
      nodeLabel: editingNode.data('label')
    };
    updateBadge();
  }

  editBox.style.display = 'none';
  editingNode = null;
  updateDescPositions();
}

// 편집창 밖 클릭 → 저장
document.getElementById('cy-wrapper').addEventListener('mousedown', function(e) {
  if (editBox.style.display === 'block' && !editBox.contains(e.target)) {
    saveEdit();
  }
});

// 접기/펼치기 — 최초 크기 고정, 이후 변하지 않음
// ═══════════════════════════════════════════════
var collapsedNodes = new Set();
var fixedSizes = {}; // parentId → {w, h} 최초 1회만 저장

function collapseNode(parentId) {
  var parent = cy.getElementById(parentId);
  if (!parent.length || parent.isChildless()) return;
  if (collapsedNodes.has(parentId)) return;
  // 최초 접기 시에만 크기 저장 (이미 저장되어 있으면 재사용)
  if (!fixedSizes[parentId]) {
    var bb = parent.boundingBox();
    fixedSizes[parentId] = { w: bb.w, h: bb.h };
  }
  var sz = fixedSizes[parentId];
  // 자식 숨김
  var children = parent.descendants();
  children.addClass('hidden');
  children.connectedEdges().addClass('hidden');
  // 접힌 상태 + 고정 크기 적용
  parent.addClass('collapsed-parent');
  parent.style({ 'min-width': sz.w + 'px', 'min-height': sz.h + 'px' });
  collapsedNodes.add(parentId);
}

function expandNode(parentId) {
  var parent = cy.getElementById(parentId);
  if (!parent.length) return;
  if (!collapsedNodes.has(parentId)) return;
  // 자식 표시
  var children = parent.descendants();
  children.removeClass('hidden');
  children.connectedEdges().removeClass('hidden');
  parent.removeClass('collapsed-parent');
  collapsedNodes.delete(parentId);
  // 하위 접힌 노드 복원
  collapsedNodes.forEach(function(id) {
    if (children.getElementById(id).length) collapseNode(id);
  });
  // 펼친 후에도 동일한 고정 크기 적용
  var sz = fixedSizes[parentId];
  if (sz) {
    parent.style({ 'min-width': sz.w + 'px', 'min-height': sz.h + 'px' });
  }
}

function collapseAll() {
  ['ENTRY', 'PDF_PATH', 'INPUT_DETAIL', 'CALC', 'RESULTS', 'OUTPUT'].forEach(collapseNode);
  cy.fit(null, 40);
}

function expandAll() {
  Array.from(collapsedNodes).forEach(expandNode);
  cy.fit(null, 30);
}

function fitAll() { cy.fit(null, 30); }

// 우클릭으로 접기/펼치기
cy.on('cxttap', 'node:parent', function(evt) {
  evt.originalEvent.preventDefault();
  var id = evt.target.id();
  if (collapsedNodes.has(id)) { expandNode(id); } else { collapseNode(id); }
});

// 위치 저장/복원 — localStorage
// ═══════════════════════════════════════════════
var STORAGE_KEY = 'rc_design_diagram_positions';

function savePositions() {
  var pos = {};
  cy.nodes().forEach(function(n) {
    var p = n.position();
    pos[n.id()] = { x: p.x, y: p.y };
  });
  // 줌/팬도 저장
  pos._zoom = cy.zoom();
  pos._pan = cy.pan();
  pos._collapsed = Array.from(collapsedNodes);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pos));
}

function loadPositions() {
  var raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    var pos = JSON.parse(raw);
    var hasAny = false;
    cy.nodes().forEach(function(n) {
      if (pos[n.id()]) {
        n.position(pos[n.id()]);
        hasAny = true;
      }
    });
    // 접힌 상태 복원
    if (pos._collapsed) {
      pos._collapsed.forEach(collapseNode);
    }
    // 줌/팬 복원
    if (pos._zoom) cy.zoom(pos._zoom);
    if (pos._pan) cy.pan(pos._pan);
    return hasAny;
  } catch(e) { return false; }
}

// 겹침 방지 — 같은 부모의 형제 노드끼리 밀어냄 (모든 레벨)
// ═══════════════════════════════════════════════
var PADDING = 8;

function resolveOverlaps() {
  // 1. 같은 부모를 공유하는 형제 그룹별로 겹침 해소
  var siblingGroups = {};
  cy.nodes().forEach(function(n) {
    if (n.hasClass('hidden')) return;
    var parentId = n.isChild() ? n.parent().id() : '_root';
    if (!siblingGroups[parentId]) siblingGroups[parentId] = [];
    siblingGroups[parentId].push(n);
  });

  Object.keys(siblingGroups).forEach(function(parentId) {
    var siblings = siblingGroups[parentId];
    if (siblings.length < 2) return;
    resolveSiblingOverlaps(siblings);
  });

  // 겹침 해소 후 모든 노드를 격자 정렬
  if (typeof GRID_SIZE !== 'undefined') {
    cy.nodes().forEach(function(n) {
      if (n.hasClass('hidden') || n.isParent()) return;
      var pos = n.position();
      n.position({ x: snapToGrid(pos.x), y: snapToGrid(pos.y) });
    });
  }
}

function resolveSiblingOverlaps(siblings) {
  var boxes = siblings.map(function(node) {
    var bb = node.boundingBox();
    return { node: node, x1: bb.x1, y1: bb.y1, x2: bb.x2, y2: bb.y2,
             cx: (bb.x1+bb.x2)/2, cy: (bb.y1+bb.y2)/2, w: bb.w, h: bb.h };
  });

  var moved = true;
  var iter = 0;
  while (moved && iter < 30) {
    moved = false;
    iter++;
    for (var i = 0; i < boxes.length; i++) {
      for (var j = i + 1; j < boxes.length; j++) {
        var a = boxes[i], b = boxes[j];
        var overlapX = Math.min(a.x2 + PADDING, b.x2 + PADDING) - Math.max(a.x1 - PADDING, b.x1 - PADDING);
        var overlapY = Math.min(a.y2 + PADDING, b.y2 + PADDING) - Math.max(a.y1 - PADDING, b.y1 - PADDING);
        if (overlapX > 0 && overlapY > 0) {
          moved = true;
          var dx = 0, dy = 0;
          if (overlapX < overlapY) {
            dx = (a.cx <= b.cx) ? -overlapX / 2 - 1 : overlapX / 2 + 1;
          } else {
            dy = (a.cy <= b.cy) ? -overlapY / 2 - 1 : overlapY / 2 + 1;
          }
          moveNode(a, dx, dy);
          moveNode(b, -dx, -dy);
        }
      }
    }
  }
}

function moveNode(box, dx, dy) {
  var node = box.node;
  if (node.isChildless()) {
    // 리프 노드: 직접 이동
    var p = node.position();
    node.position({ x: p.x + dx, y: p.y + dy });
  } else {
    // 부모 노드: 모든 리프 자손 이동 (부모는 자동 리사이즈)
    node.descendants().forEach(function(child) {
      if (child.isChildless() && !child.hasClass('hidden')) {
        var p = child.position();
        child.position({ x: p.x + dx, y: p.y + dy });
      }
    });
  }
  // box 좌표 갱신
  box.x1 += dx; box.x2 += dx; box.cx += dx;
  box.y1 += dy; box.y2 += dy; box.cy += dy;
}

// 그리드 스냅 설정 (50px 단위)
var GRID_SIZE = 25;
function snapToGrid(val) { return Math.round(val / GRID_SIZE) * GRID_SIZE; }

// 노드 드래그 끝나면 그리드 스냅 + 드래그한 노드만 밀어내기
cy.on('dragfree', 'node', function(evt) {
  var node = evt.target;
  var pos = node.position();
  node.position({ x: snapToGrid(pos.x), y: snapToGrid(pos.y) });

  // 드래그한 노드만 겹침 해소 (다른 노드는 안 움직임)
  // 리프 노드는 같은 부모의 형제와, 부모(박스)는 같은 레벨의 다른 부모와 비교
  var bb = node.boundingBox();
  var parentId = node.isChild() ? node.parent().id() : '_root';
  var siblings = [];
  cy.nodes().forEach(function(n) {
    if (n.id() === node.id() || n.hasClass('hidden')) return;
    if (node.isParent()) {
      // 박스끼리: 같은 부모 레벨의 다른 박스
      var myParent = node.isChild() ? node.parent().id() : '_root';
      var otherParent = n.isChild() ? n.parent().id() : '_root';
      if (myParent === otherParent && n.isParent()) siblings.push(n);
    } else {
      // 리프 노드: 같은 부모의 형제
      var np = n.isChild() ? n.parent().id() : '_root';
      if (np === parentId) siblings.push(n);
    }
  });

  var maxTries = 20;
  for (var t = 0; t < maxTries; t++) {
    var pushed = false;
    bb = node.boundingBox();
    for (var i = 0; i < siblings.length; i++) {
      var ob = siblings[i].boundingBox();
      var gap = 5;
      if (bb.x2 + gap > ob.x1 && bb.x1 - gap < ob.x2 && bb.y2 + gap > ob.y1 && bb.y1 - gap < ob.y2) {
        // 겹침 발견 — 드래그한 노드를 가장 가까운 방향으로 밀기
        var dx = (bb.x1 + bb.x2) / 2 - (ob.x1 + ob.x2) / 2;
        var dy = (bb.y1 + bb.y2) / 2 - (ob.y1 + ob.y2) / 2;
        var overlapX = (bb.x2 - bb.x1 + ob.x2 - ob.x1) / 2 + gap - Math.abs(dx);
        var overlapY = (bb.y2 - bb.y1 + ob.y2 - ob.y1) / 2 + gap - Math.abs(dy);

        if (overlapX < overlapY) {
          var moveX = dx >= 0 ? overlapX : -overlapX;
          node.position({ x: snapToGrid(node.position().x + moveX), y: node.position().y });
        } else {
          var moveY = dy >= 0 ? overlapY : -overlapY;
          node.position({ x: node.position().x, y: snapToGrid(node.position().y + moveY) });
        }
        pushed = true;
        break;
      }
    }
    if (!pushed) break;
  }

  savePositions();
  updateDescPositions();
});

  } else {
    cy.nodes(':childless').style({ 'border-width': 1.5 });
    cy.nodes(':parent').style({ 'border-width': 2 });
  }
});

// 겹침 해소를 반복 실행 (compound 노드 bbox가 갱신될 시간 확보)
function resolveOverlapsDeep(callback) {
  var pass = 0;
  var maxPass = 8;
  function doPass() {
    resolveOverlaps();
    pass++;
    if (pass < maxPass) {
      setTimeout(doPass, 60);
    } else if (callback) {
      callback();
    }
  }
  doPass();
}

// 접기/펼치기 래핑 (resolveOverlapsDeep 사용)
collapseNode = function(id) { origCollapse(id); setTimeout(function(){ resolveOverlapsDeep(savePositions); }, 50); };
expandNode = function(id) { origExpand(id); setTimeout(function(){ resolveOverlapsDeep(savePositions); }, 50); };

// 페이지 로드 시 저장된 위치 복원
if (!loadPositions()) {
  resolveOverlapsDeep(function() { cy.fit(null, 30); });
} else {
  resolveOverlapsDeep();
}

// 부모 노드 text-max-width를 박스 너비에 맞춤
function updateParentTextWidth() {
  cy.nodes(':parent').forEach(function(n) {
    var bb = n.boundingBox();
    n.style('text-max-width', Math.max(200, bb.w - 20));
  });
}
updateParentTextWidth();
cy.on('layoutstop render', updateParentTextWidth);
// position 변경 시에도 (드래그, 접기/펼치기)
cy.on('position', 'node', function() {
  clearTimeout(window._parentTextTimer);
  window._parentTextTimer = setTimeout(updateParentTextWidth, 100);
});

// 브라우저 기본 우클릭 메뉴 방지
document.getElementById('cy').addEventListener('contextmenu', function(e) { e.preventDefault(); });
</script>
